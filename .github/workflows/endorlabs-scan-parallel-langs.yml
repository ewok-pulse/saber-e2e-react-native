      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=swift"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-swift
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"