# ─────────────────────────────────────────────────────────────────
# Generated by Saber v0.1.0 on 2026-05-21 for react-native
#
#   Languages:    java, javascript/typescript, ruby, swift, c/c++
#   Build:        yarn, bundler, gradle
#   Namespace:    endor-solutions-ypulse.github-ci.saber-e2e
#   Auth:         GitHub OIDC (keyless)
#   PR behavior:  comment on PR (non-blocking)
#   PR scan mode: quick
#
# Regenerate this file with `saber scan repo` (point at this repo's path).
# Hand-edits will be overwritten on the next regeneration.
# ─────────────────────────────────────────────────────────────────
#
# Saber split one or more scan units to fit standard runner memory:
#   • java: 3 shards (packages, private, root)
#     Saber split the java scan into multiple jobs because this repo has 16
#     java root manifests — a single full-reachability scan exceeds the
#     ubuntu-latest runner memory budget. Each shard scans one top-level
#     subtree with full reachability preserved.
#   • javascript/typescript: 3 shards (packages, private, root)
#     Saber split the javascript/typescript scan into multiple jobs because
#     this repo has 32 javascript/typescript root manifests — a single
#     full-reachability scan exceeds the ubuntu-latest runner memory budget.
#     Each shard scans one top-level subtree with full reachability preserved.
#
name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      java-packages: ${{ steps.filter.outputs.java-packages }}
      java-private: ${{ steps.filter.outputs.java-private }}
      java-root: ${{ steps.filter.outputs.java-root }}
      javascript-typescript-packages: ${{ steps.filter.outputs.javascript-typescript-packages }}
      javascript-typescript-private: ${{ steps.filter.outputs.javascript-typescript-private }}
      javascript-typescript-root: ${{ steps.filter.outputs.javascript-typescript-root }}
      ruby: ${{ steps.filter.outputs.ruby }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            java-packages:
              - packages/**/'**/pom.xml'
              - packages/**/'**/build.gradle'
              - packages/**/'**/build.gradle.kts'
              - packages/**/'**/*.java'
            java-private:
              - private/**/'**/pom.xml'
              - private/**/'**/build.gradle'
              - private/**/'**/build.gradle.kts'
              - private/**/'**/*.java'
            java-root:
              - '**/pom.xml'
              - '**/build.gradle'
              - '**/build.gradle.kts'
              - '**/*.java'
            javascript-typescript-packages:
              - packages/**/'**/package.json'
              - packages/**/'**/package-lock.json'
              - packages/**/'**/yarn.lock'
              - packages/**/'**/pnpm-lock.yaml'
              - packages/**/'**/rush.json'
              - packages/**/'**/*.js'
              - packages/**/'**/*.ts'
              - packages/**/'**/*.tsx'
            javascript-typescript-private:
              - private/**/'**/package.json'
              - private/**/'**/package-lock.json'
              - private/**/'**/yarn.lock'
              - private/**/'**/pnpm-lock.yaml'
              - private/**/'**/rush.json'
              - private/**/'**/*.js'
              - private/**/'**/*.ts'
              - private/**/'**/*.tsx'
            javascript-typescript-root:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/rush.json'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
            ruby:
              - '**/Gemfile'
              - '**/Gemfile.lock'
              - '**/*.gemspec'
              - '**/*.rb'
            swift:
              - '**/Package.swift'
              - '**/Package@swift-*.swift'
              - '**/Podfile'
              - '**/*.swift'
