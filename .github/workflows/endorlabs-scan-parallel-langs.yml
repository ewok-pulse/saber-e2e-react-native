    name: "PR Scan: java (packages)"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.java-packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: ./gradlew build -x test
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=java --include-path=packages/** --quick-scan"
