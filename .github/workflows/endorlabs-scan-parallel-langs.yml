          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=java --include-path=packages/**"
          sarif_file: findings.sarif
          scan_github_actions: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-java-packages
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
